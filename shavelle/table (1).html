<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Event Hyundai</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    table {
      margin: 20px auto;
      width: 1140px;
      padding: 0 15px;
      border-collapse: collapse;
      line-height: 1.4;
    }

    thead th {
      background-color: #002C5F;
      color: #FFFFFF;
      padding: 12px;
      border: 1px solid #ccc;
      font-weight: bold;
      text-align: center;
    }

    td {
      border: 1px solid #ccc;
      padding: 12px;
      text-align: center;
      vertical-align: middle;
    }

    tr {
      text-align: center;
    }

    .row-title {
      font-weight: bold;
    }

    .note {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
      display: block;
    }

    .strikethrough {
      text-decoration: line-through;
      color: #666;
      display: block;
    }

    .highlight {
      font-weight: bold;
      color: #000;
    }

    .bg-light-gray {
      background-color: #f8f8f8;
    }

    /* Responsive: Mobile Font Size */
    @media (max-width: 768px) {
      body {
        font-size: 14px;
      }

      table {
        font-size: 13px;
      }

      .note {
        font-size: 11px;
      }

      td, th {
        padding: 8px;
      }
    }
  </style>
</head>
<body>

<table>
  <thead>
    <tr>
      <th>Period</th>
      <th>City</th>
      <th>Location</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>26 January - 01 February 2026</td>
      <td>Bogor</td>
      <td>Cibinong City Mall</td>
    </tr>
    <tr>
      <td>26 January - 01 February 2026</td>
      <td>Bekasi</td>
      <td>Summarecon Mall Bekasi</td>
    </tr>
    <tr class="bg-light-gray">
      <td>26 January - 01 February 2026</td>
      <td>Makassar</td>
      <td>Transtudio Mall Makassar</td>
    </tr>
    <tr class="bg-light-gray">
      <td>26 January - 08 February 2026</td>
      <td>Pekanbaru</td>
      <td>Living World</td>
    </tr>
  </tbody>
</table>

</body>
</html>
