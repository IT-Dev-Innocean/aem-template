# Konfigurasi Netlify untuk monorepo (editor ada di subfolder).
# File ini OVERRIDE pengaturan di Netlify UI — cukup push ke GitHub lalu redeploy.

[build]
  base = "editor"
  command = "npm run build"
  publish = "dist"

[build.environment]
  GITHUB_OWNER = "IT-Dev-Innocean"
  GITHUB_REPO = "aem-template"
  GITHUB_BRANCH = "main"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/files"
  to = "/.netlify/functions/files"
  status = 200

[[redirects]]
  from = "/api/files/*"
  to = "/.netlify/functions/files/:splat"
  status = 200
