<html>

<head>
    <title>FIFA World Cup 2026</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .table-container {
            width: 100%;
            max-width: 1120px;
            margin: 0 auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            line-height: 1.4;
        }

        thead th {
            background-color: #002C5F;
            color: #FFFFFF;
            padding: 12px;
            border: 1px solid #ccc;
            font-weight: bold;
            text-align: left;
        }

        td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
            vertical-align: middle;
        }

        tr {
            text-align: left;
        }

        .row-title {
            font-weight: bold;
        }

        .note {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
            display: block;
        }

        .strikethrough {
            text-decoration: line-through;
            color: #666;
            display: block;
        }

        .highlight {
            font-weight: bold;
            color: #000;
        }

        .bg-light-gray {
            background-color: #f8f8f8;
        }

        td.col-left {
            text-align: left;
        }

        /* Responsive: Mobile Font Size */
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }

            table {
                font-size: 13px;
            }

            .note {
                font-size: 11px;
            }

            td,
            th {
                padding: 8px;
            }
        }
    </style>
</head>

<body>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Kota</th>
                    <th>Lokasi</th>
                    <th>Tanggal</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Batam</td>
                    <td>Atrium 2, Grand Batam Mall</td>
                    <td>25 - 31 Mei 2026</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>

</html>
